<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineDaily - 每日推荐</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-red': '#E50914',
                        'gold': '#fbbf24'
                    }
                }
            }
        }
    </script>
    <style>
        /* 背景图层 - 双图层交叉淡入 */
        .bg-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s ease-in-out;
        }
        .bg-layer-1 { opacity: 1; z-index: 1; }
        .bg-layer-2 { opacity: 0; z-index: 2; }

        /* 遮罩层 - 左右渐变 */
        .overlay-gradient {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: linear-gradient(to right,
                rgba(0, 0, 0, 0.85) 0%,
                rgba(0, 0, 0, 0.3) 60%,
                rgba(0, 0, 0, 0.1) 100%
            );
        }

        /* 底部遮罩 - 让文字更清晰 */
        .overlay-bottom {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: linear-gradient(to top,
                rgba(0, 0, 0, 0.9) 0%,
                rgba(0, 0, 0, 0.4) 40%,
                transparent 100%
            );
        }

        /* 内容淡入动画 */
        .fade-enter-active {
            transition: all 0.5s ease;
        }
        .fade-enter {
            opacity: 0;
            transform: translateY(20px);
        }
        .fade-enter-done {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo 渐变 */
        .logo-gradient {
            background: linear-gradient(135deg, #7c5cfc, #b47aff);
        }

        /* 滚动条隐藏 */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }

        /* 评分星星 */
        .score-star {
            color: #fbbf24;
            font-weight: 700;
        }
        .score-star::before {
            content: "★ ";
        }

        /* 响应式调整 */
        @media (max-width: 640px) {
            #movie-title {
                font-size: 2.5rem !important;
            }
            .main-content {
                padding-left: 1.5rem !important;
                padding-right: 1.5rem !important;
            }
        }
    </style>
</head>
<body>
   <div id="app" class="h-screen w-screen overflow-hidden">

        <!-- ========================================================== -->
        <!-- 背景层（双图层交叉淡入切换）                                -->
        <!-- ========================================================== -->
        <div id="bg-layer-1" class="bg-layer bg-layer-1"
        :style="currentMovie.bg ? { backgroundImage:'url('+ currentMovie.bg +')'}: {}"></div>


        <!-- 遮罩层 -->
        <div class="overlay-gradient"></div>
        <div class="overlay-bottom"></div>

        <!-- ========================================================== -->
        <!-- 顶部导航栏                                                  -->
        <!-- ========================================================== -->
        <nav class="absolute top-0 left-0 right-0 p-6 z-20 flex justify-between items-start">
            <div class="flex items-center gap-1.5">
                <span class="text-white text-xl font-bold tracking-wider">CINE</span>
                <span class="logo-gradient text-white text-sm font-semibold px-2.5 py-0.5 rounded-md">DAILY</span>
            </div>
            <div class="flex items-center gap-3 text-white/50 text-xs">
                <button class="hover:text-white transition-colors">4K超高清</button>
                <button class="hover:text-white transition-colors">选集</button>
                <button class="hover:text-white transition-colors">2.0x</button>
                <button class="hover:text-white transition-colors">字幕</button>
            </div>
        </nav>

        <!-- ========================================================== -->
        <!-- 主内容区：居中布局                                          -->
        <!-- ========================================================== -->
        <main class="relative z-20 w-full h-full flex items-center justify-center px-8 md:px-16">
            <transition name="fade" mode="out-in">

                <div :key="currentMovie.id" v-if="currentMovie.id !=undefined">

                    <!-- 标签 + 评分 -->
                    <div class="flex items-center gap-4 mb-4">
                        <span id="movie-tag" class="bg-white/10 backdrop-blur-sm text-white/80 text-sm font-medium px-4 py-1.5 rounded-full border border-white/10">
                            {{currentMovie.tags}}
                        </span>
                        <span id="movie-score" class="text-yellow-400 font-bold text-lg">
                            <span class="score-star">{{currentMovie.score}}</span>
                        </span>
                    </div>

                    <!-- 标题 -->
                    <h1 id="movie-title" class="text-5xl md:text-7xl font-bold text-white leading-tight mb-4">
                        {{currentMovie.title}}
                    </h1>

                    <!-- 描述 -->
                    <p id="movie-desc" class="text-gray-300 text-base md:text-lg max-w-2xl leading-relaxed mb-8">
                       {{currentMovie.desc}}
                    </p>

                    <!-- 按钮组 -->
                    <div class="flex gap- 4">
                        <a id="btn-watch" :href="'/detail.html?id=' + (currentMovie.id || 1)"
                           class="bg-brand-red hover:bg-red-700 text-white font-semibold px-8 py-3 rounded-full transition-all duration-300 flex items-center gap-2 text-sm shadow-lg shadow-red-600/30 hover:shadow-red-600/50">
                            <i class="fas fa-play"></i> 立即观看
                        </a>
                       <button @click="fetchMovie" class="bg-white/10 hover:bg-white/20 text-white font-medium px-8 py-3 rounded-full transition-all duration-300 flex items-center gap-2 text-sm border border-white/10 backdrop-blur-sm">
                            <i class="fas fa-random" :class="{'animate-spin' : loading}"></i>
                           {{loading ? '加载中...' : '换一个'}}
                        </button>
                    </div>

                </div>
            </transition>
        </main>
   </div>

    <!-- ========================================================== -->
    <!-- JavaScript                                                  -->
    <!-- ========================================================== -->
    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const currentMovie = ref({});
                const loading =ref(false);
                //定义获取随机电影方法
                const fetchMovie = async ()=>{
                    loading.value = true;
                    try {
                        const res = await fetch('/api/movie/random');
                        const date = await res.json();

                        setTimeout(()=>{
                            currentMovie.value = date;
                            loading.value = false;
                        },300)
                        console.log(date)
                    }catch (error){
                        console.log('电影信息获取失败:',error)
                        loading.value = false;
                    }
                };
                //页面加载是执行fetchMovie
                onMounted(()=>{
                    fetchMovie();
                });


            // ... 所有的逻辑都写在这里 ...
                return {currentMovie, loading, fetchMovie}; // 把数据暴露给 HTML 使用
            }
        }).mount('#app');
    </script>

</body>
</html>
